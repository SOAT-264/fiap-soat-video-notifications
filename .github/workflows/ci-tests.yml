name: CI Tests

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install \
            fastapi \
            pydantic \
            pydantic-settings \
            sqlalchemy \
            asyncpg \
            redis \
            aiosmtplib \
            httpx \
            aioboto3 \
            pytest \
            pytest-asyncio \
            pytest-cov

      - name: Run tests with coverage gate
        run: python -m pytest
